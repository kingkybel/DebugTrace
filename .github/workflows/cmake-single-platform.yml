# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake and SonarQube

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest
    env:
      DKYB_DEPENDENCY_CACHE_ROOT: ${{ github.workspace }}/dkyb-cache
      INSTALL_PREFIX: ${{ github.workspace }}/dkyb-install
      DEPENDENCY_LIST: |
        gtest:1.17.0
      DEPENDENCY_BUILD_TYPE: Release

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build curl unzip lcov

    - name: Compute dependency hash
      id: dependency-hash
      run: |
        deps="${DEPENDENCY_LIST:-}"
        normalized=$(printf '%s' "$deps" | tr '\r' '\n' | sed -E 's/#.*//g' | sed -E 's/^[[:space:]]+//;s/[[:space:]]+$//' | grep -v '^$' || true)
        if [[ -z "$normalized" ]]; then
          normalized=''
        fi
        hash=$(printf '%s\n' "$normalized" | sha256sum | awk '{print $1}')
        echo "hash=$hash" >> "$GITHUB_OUTPUT"

    - name: Restore dependency cache
      uses: actions/cache@v4
      with:
        path: ${{ env.DKYB_DEPENDENCY_CACHE_ROOT }}
        key: cmake-env-${{ steps.dependency-hash.outputs.hash }}
        restore-keys: |
          cmake-env-${{ steps.dependency-hash.outputs.hash }}-
          cmake-env-

    - name: Build and cache dependencies
      run: cmake-common/scripts/build-and-cache-dependencies.sh

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DDKYB_DEPENDENCY_CACHE_ROOT=${{env.DKYB_DEPENDENCY_CACHE_ROOT}} -DCMAKE_PREFIX_PATH=${{ env.INSTALL_PREFIX }}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --test-dir ${{github.workspace}}/build -C ${{env.BUILD_TYPE}} --output-on-failure

    - name: Configure CMake (coverage)
      run: |
        cmake -B ${{github.workspace}}/build-coverage -DCMAKE_BUILD_TYPE=Coverage -DCMAKE_PREFIX_PATH=${{ env.INSTALL_PREFIX }}

    - name: Build (coverage)
      run: cmake --build ${{github.workspace}}/build-coverage --config Coverage

    - name: Test (coverage)
      run: |
        TEST_COUNT="$(ctest --test-dir "${{github.workspace}}/build-coverage" -N 2>/dev/null | sed -n 's/^Total Tests: //p' | tail -n1)"
        if [[ -n "${TEST_COUNT}" && "${TEST_COUNT}" -gt 0 ]]; then
          ctest --test-dir "${{github.workspace}}/build-coverage" -C Coverage --output-on-failure
        else
          mapfile -t TEST_BINS < <(find "${{github.workspace}}/build-coverage" -type f -perm -111 \( -name 'run_tests' -o -name 'test_*' \) | sort)
          if [[ ${#TEST_BINS[@]} -eq 0 ]]; then
            echo "No tests registered in CTest and no test executables found"
            exit 1
          fi
          for t in "${TEST_BINS[@]}"; do
            echo "Running $t"
            "$t" --gtest_color=no || "$t"
          done
        fi

    - name: Check coverage data files
      run: |
        GCDA_COUNT="$(find "${{github.workspace}}/build-coverage" -type f -name '*.gcda' | wc -l)"
        echo "Found ${GCDA_COUNT} .gcda files"
        if [[ "${GCDA_COUNT}" -eq 0 ]]; then
          echo "No .gcda files found. Build tree:"
          find "${{github.workspace}}/build-coverage" -maxdepth 4 -type d | sed -n '1,120p'
          exit 1
        fi

    - name: Create coverage report
      run: |
        lcov --capture           --ignore-errors mismatch,unused,empty           --directory "${{github.workspace}}/build-coverage"           --output-file coverage.info           --rc branch_coverage=1           --rc geninfo_unexecuted_blocks=1
        lcov --remove coverage.info           --ignore-errors mismatch,unused,empty           "/usr/*"           "${{github.workspace}}/test/*"           "${{github.workspace}}/DebugTrace/*"           "${{github.workspace}}/TypeTraits/*"           "${{github.workspace}}/ContainerConvert/*"           "*/_deps/*"           --output-file coverage.filtered.info           --rc branch_coverage=1           --rc geninfo_unexecuted_blocks=1
        genhtml coverage.filtered.info --branch-coverage --ignore-errors source --output-directory coverage-html
        lcov --summary coverage.filtered.info --ignore-errors mismatch,unused,empty --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 | tee coverage-summary.txt

    - name: Publish coverage summary
      run: |
        echo "## Unit Test Coverage Report" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo '```text' >> "$GITHUB_STEP_SUMMARY"
        cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "HTML report is uploaded as artifact `${{ github.event.repository.name }}-coverage-html-report`." >> "$GITHUB_STEP_SUMMARY"
        echo "Open `coverage-html/index.html` after download." >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.repository.name }}-unit-test-coverage-report
        path: |
          coverage.filtered.info
          coverage-summary.txt
          coverage-html/
        if-no-files-found: error

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.repository.name }}-coverage-html-report
        path: coverage-html/
        if-no-files-found: error

    - name: Link cached Sonar build-wrapper
      run: |
        if [[ -f "${{env.DKYB_DEPENDENCY_CACHE_ROOT}}/sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64" ]]; then
          sudo ln -sf "${{env.DKYB_DEPENDENCY_CACHE_ROOT}}/sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64" /usr/local/bin/build-wrapper-linux-x86-64
        fi

    - name: Configure CMake (sonar)
      run: |
        cmake -S . -B "${{github.workspace}}/build_sonar" -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_PREFIX_PATH=${{ env.INSTALL_PREFIX }}

    - name: Build (captured by build-wrapper)
      run: |
        build-wrapper-linux-x86-64 --out-dir bw-output cmake --build "${{github.workspace}}/build_sonar" --parallel

    - name: Sonar scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=${{ vars.SONAR_ORG }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.sources=include,test
          -Dsonar.cfamily.build-wrapper-output=bw-output
