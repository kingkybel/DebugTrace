# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake and SonarQube

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo

jobs:
  prepare-environment:
    uses: kingkybel/CMakeCommon/.github/workflows/cmake-single-platform.yml@main
    with:
      dependency-list: |
        gtest:1.17.0

  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest
    needs:
      - prepare-environment

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Restore dependency cache
      uses: actions/cache@v4
      with:
        path: build/dkyb-cache
        key: cmake-env-${{ needs.prepare-environment.outputs.dependency-hash }}-${{ hashFiles('cmake/**') }}
        restore-keys: |
          cmake-env-${{ needs.prepare-environment.outputs.dependency-hash }}-
          cmake-env-

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DDKYB_DEPENDENCY_CACHE_ROOT=${{github.workspace}}/build/dkyb-cache

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --test-dir ${{github.workspace}}/build -C ${{env.BUILD_TYPE}} --output-on-failure

    - name: Test
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --test-dir ${{github.workspace}}/build -C ${{env.BUILD_TYPE}} --output-on-failure


  coverage:
    needs: build
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: build-coverage
      BUILD_TYPE: Coverage

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Restore dependency cache
      uses: actions/cache@v4
      with:
        path: build/dkyb-cache
        key: cmake-env-${{ needs.prepare-environment.outputs.dependency-hash }}
        restore-keys: |
          cmake-env-${{ needs.prepare-environment.outputs.dependency-hash }}-
          cmake-env-

    - name: Install cached dependencies
      run: |
        cmake -S cmake-common/cmake/dependency -B ${{github.workspace}}/build/gtest-cache \
          -DDKYB_DEPENDENCY_NAME=gtest \
          -DDKYB_DEPENDENCY_VERSION=1.17.0 \
          -DDKYB_DEPENDENCY_BUILD=ON \
          -DDKYB_DEPENDENCY_CACHE_ROOT=${{github.workspace}}/build/dkyb-cache \
          -DDKYB_DEPENDENCY_SYSTEM_INSTALL_PREFIX=/usr \
          -DDKYB_DEPENDENCY_SYSTEM_INSTALL_USE_SUDO=ON \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build ${{github.workspace}}/build/gtest-cache --target dkyb_dependency_runner --config Release

    - name: Link cached lcov
      run: |
        if [[ -d "${{github.workspace}}/build/dkyb-cache/tools/lcov" ]]; then
          for tool in lcov genhtml geninfo; do
            src="${{github.workspace}}/build/dkyb-cache/tools/lcov/$tool"
            if [[ -f "$src" ]]; then
              sudo ln -sf "$src" "/usr/local/bin/$tool"
            fi
          done
        fi

    - name: Configure CMake (coverage)
      run: |
        cmake -B ${{github.workspace}}/${{env.BUILD_DIR}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build (coverage)
      run: cmake --build ${{github.workspace}}/${{env.BUILD_DIR}} --config ${{env.BUILD_TYPE}}

    - name: Test (coverage)
      run: |
        TEST_COUNT="$(ctest --test-dir "${{github.workspace}}/${{env.BUILD_DIR}}" -N 2>/dev/null | sed -n 's/^Total Tests: //p' | tail -n1)"
        if [[ -n "${TEST_COUNT}" && "${TEST_COUNT}" -gt 0 ]]; then
          ctest --test-dir "${{github.workspace}}/${{env.BUILD_DIR}}" -C "${{env.BUILD_TYPE}}" --output-on-failure
        else
          mapfile -t TEST_BINS < <(find "${{github.workspace}}/${{env.BUILD_DIR}}" -type f -perm -111 \( -name 'run_tests' -o -name 'test_*' \) | sort)
          if [[ ${#TEST_BINS[@]} -eq 0 ]]; then
            echo "No tests registered in CTest and no test executables found"
            exit 1
          fi
          for t in "${TEST_BINS[@]}"; do
            echo "Running $t"
            "$t" --gtest_color=no || "$t"
          done
        fi

    - name: Check coverage data files
      run: |
        GCDA_COUNT="$(find "${{github.workspace}}/${{env.BUILD_DIR}}" -type f -name '*.gcda' | wc -l)"
        echo "Found ${GCDA_COUNT} .gcda files"
        if [[ "${GCDA_COUNT}" -eq 0 ]]; then
          echo "No .gcda files found. Build tree:"
          find "${{github.workspace}}/${{env.BUILD_DIR}}" -maxdepth 4 -type d | sed -n '1,120p'
          exit 1
        fi

    - name: Create coverage report
      run: |
        lcov --capture           --ignore-errors mismatch,unused,empty           --directory "${{github.workspace}}/${{env.BUILD_DIR}}"           --output-file coverage.info           --rc branch_coverage=1           --rc geninfo_unexecuted_blocks=1
        lcov --remove coverage.info           --ignore-errors mismatch,unused,empty           "/usr/*"           "${{github.workspace}}/test/*"           "${{github.workspace}}/DebugTrace/*"           "${{github.workspace}}/TypeTraits/*"           "${{github.workspace}}/ContainerConvert/*"           "*/_deps/*"           --output-file coverage.filtered.info           --rc branch_coverage=1           --rc geninfo_unexecuted_blocks=1
        genhtml coverage.filtered.info --branch-coverage --ignore-errors source --output-directory coverage-html
        lcov --summary coverage.filtered.info --ignore-errors mismatch,unused,empty --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 | tee coverage-summary.txt

    - name: Publish coverage summary
      run: |
        echo "## Unit Test Coverage Report" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo '```text' >> "$GITHUB_STEP_SUMMARY"
        cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "HTML report is uploaded as artifact `${{ github.event.repository.name }}-coverage-html-report`." >> "$GITHUB_STEP_SUMMARY"
        echo "Open `coverage-html/index.html` after download." >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.repository.name }}-unit-test-coverage-report
        path: |
          coverage.filtered.info
          coverage-summary.txt
          coverage-html/
        if-no-files-found: error

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.repository.name }}-coverage-html-report
        path: coverage-html/
        if-no-files-found: error

  sonar:
    needs: build
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: build_sonar
      BUILD_TYPE: Release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: 'recursive'

    - name: Restore dependency cache
      uses: actions/cache@v4
      with:
        path: build/dkyb-cache
        key: cmake-env-${{ needs.prepare-environment.outputs.dependency-hash }}
        restore-keys: |
          cmake-env-${{ needs.prepare-environment.outputs.dependency-hash }}-
          cmake-env-
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build curl unzip

    - name: Link cached Sonar build-wrapper
      run: |
        if [[ -f "${{github.workspace}}/build/dkyb-cache/tools/sonar/build-wrapper-linux-x86-64" ]]; then
          sudo ln -sf "${{github.workspace}}/build/dkyb-cache/tools/sonar/build-wrapper-linux-x86-64" /usr/local/bin/build-wrapper-linux-x86-64
        fi

    - name: Configure CMake
      run: |
        cmake -S . -B "${{env.BUILD_DIR}}" -G Ninja -DCMAKE_BUILD_TYPE="${{env.BUILD_TYPE}}" -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Build (captured by build-wrapper)
      run: |
        build-wrapper-linux-x86-64 --out-dir bw-output cmake --build "${{env.BUILD_DIR}}" --parallel

    - name: Sonar scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=${{ vars.SONAR_ORG }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.sources=include,test
          -Dsonar.cfamily.build-wrapper-output=bw-output
